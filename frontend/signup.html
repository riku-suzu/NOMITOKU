<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ノミトク - 新規会員登録</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="text/javascript" src="/js/general.js"></script>
    <script type="text/javascript" src="/js/api.js"></script>
  </head>
  <body>
    <div class="container">
      <!-- <h1>新規会員登録</h1>
      <form>
        <div class="form-group">
          <label for="reg-email">メールアドレス:</label>
          <input type="email" id="reg-email" name="email" required />
        </div>
        <div class="form-group">
          <label for="reg-password">パスワード:</label>
          <input type="password" id="reg-password" name="password" required />
        </div>
        <button type="submit" class="button">決定</button>
      </form> -->

      <div class="login-container">
        <h1>新規登録</h1>
        <div>
          <div id="megs" style="color: red">&nbsp;</div>
          <label for="nickname">ニックネーム:</label>
          <input type="text" id="nickname" name="nickname" required />
          <br />

          <label for="email">メールアドレス:</label>
          <input type="email" id="email" name="email" required />
          <br />

          <label for="password">パスワード:</label>
          <input type="password" id="password" name="password" required />
          <br /><br />

          <button onclick="register()" class="button13">新規登録</button>
        </div>
      </div>
    </div>
  </body>


<script>
  if (checkLogin()) {
    location.href = "/home.html"
  }

  const register = () => {
    // フォームの値を取得
    // .trim()で前後の空白を削除
    const nickname = document.getElementById('nickname').value.trim()
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value.trim()

    // メッセージを表示するための要素を取得
    const megsBox = document.getElementById('megs')

    // 全ての項目が入力されているかチェック
    if (nickname === '' || email === '' || password === '') {
      megsBox.innerText = '全ての項目を入力してください'
      return
    }

    // API用データを作成する
    const data = {
      email: email,
      nickname: nickname,
      password: password
    }
    // API操作を呼び出す
    signUpApi(data)
      .then((res) => {
        megsBox.innerHTML = '新規登録に成功しました <a href="/login.html">ログインページへ</a>'
      })
      .catch((error) => {
        megsBox.innerText = error.message
        throw error
      })
  }
</script>
</html>
