<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ノミトク - ログイン</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="text/javascript" src="/js/general.js"></script>
    <script type="text/javascript" src="/js/api.js"></script>
  </head>
  <body>

    <div class="container">
        <h1>ノミトク</h1>
        <h2>ログイン</h2>
        <div class="login-container">
          <div id="megs" style="color: red">&nbsp;</div>
          <label for="email">メールアドレス:</label>
          <input type="email" id="email" name="email" required />
          <br />
          <label for="password">パスワード:</label>
          <input type="password" id="password" name="password" required />
          <br /><br />
          
        </div>
        <button onclick="login()" class="button13">ログイン</button>

        
      </div>
    </div>
  </body>

  <script>
    if (checkLogin()) {
      location.href = "/home.html";
    }

    const login = () => {
      // フォームの値を取得
      // .trim()で前後の空白を削除
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      // メッセージを表示するための要素を取得
      const megsBox = document.getElementById("megs");

      // 全ての項目が入力されているかチェック
      if (email === "" || password === "") {
        megsBox.innerText = "全ての項目を入力してください";
        return;
      }

      // APIにリクエストを送信
      loginApi(email, password)
        .then((data) => {
          location.href = "/home.html";
        })
        .catch((error) => {
          megsBox.innerText = error.message;
          throw error;
        });
    };
  </script>
</html>
